<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LHA Filter Test</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9f9f9; }
    .fake-header { background: #1a3a5c; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .fake-header h1 { font-size: 18px; margin: 0; }
    .fake-header span { font-size: 13px; opacity: 0.6; }
    .test-nav { background: #fff; padding: 12px 24px; border-bottom: 1px solid #eee; font-size: 13px; display: flex; flex-wrap: wrap; gap: 8px 16px; }
    .test-nav strong { color: #1a3a5c; margin-right: 4px; }
    .test-nav a { color: #555; text-decoration: none; font-weight: 500; padding: 4px 10px; border-radius: 6px; }
    .test-nav a:hover { background: #f0f4f8; color: #1a3a5c; }
    .test-nav a.active { background: #1a3a5c; color: #fff; }
    .test-nav .sep { color: #ddd; margin: 0 4px; }
    .page-content { min-height: 400px; }
  </style>
</head>
<body>
  <div class="fake-header">
    <h1>Lighthouse Aquatics</h1>
    <span>Filter Test Page — pick a page below to test</span>
  </div>
  <div class="test-nav">
    <strong>Combined:</strong>
    <a href="?page=live-corals">Live Corals</a>
    <a href="?page=all-fish">All Fish</a>
    <a href="?page=aquarium-supplies">All Supplies</a>
    <span class="sep">|</span>
    <strong>Corals:</strong>
    <a href="?page=corals-lps">LPS</a>
    <a href="?page=corals-sps">SPS</a>
    <a href="?page=corals-soft">Soft</a>
    <a href="?page=corals-misc">Misc</a>
    <span class="sep">|</span>
    <strong>Other:</strong>
    <a href="?page=livestock">Livestock</a>
    <a href="?page=equipment">Equipment</a>
    <a href="?page=aquariums">Aquariums</a>
    <a href="?page=filtration">Filtration</a>
    <a href="?page=supplements">Supplements</a>
    <a href="?page=lighting">Lighting</a>
  </div>

  <div class="page-content"></div>

  <script>
    var page = new URLSearchParams(location.search).get('page') || 'live-corals';
    document.querySelectorAll('.test-nav a').forEach(function(a) {
      if (a.href.includes('page=' + page)) a.classList.add('active');
    });
    if (!location.search) history.replaceState(null, '', '?page=live-corals');
  </script>
  <script src="lighthouse-filters.js"></script>
</body>
</html>
